name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.0.2). Updates package.json before publishing."
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install dependencies
        run: npm ci
        working-directory: langtrace-vscode

      - name: Bump version (manual trigger only)
        if: github.event_name == 'workflow_dispatch'
        run: npm version ${{ github.event.inputs.version }} --no-git-tag-version
        working-directory: langtrace-vscode

      - name: Compile
        run: npm run compile
        working-directory: langtrace-vscode

      - name: Build VSIX
        run: npx vsce package --no-dependencies
        working-directory: langtrace-vscode

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: langtrace-vscode-vsix
          path: langtrace-vscode/*.vsix

      - name: Publish to Marketplace
        run: npx vsce publish -p ${{ secrets.VSCE_PAT }} --no-dependencies
        working-directory: langtrace-vscode

